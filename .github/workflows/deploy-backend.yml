name: Deploy backend to Azure Container Apps

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:

env:
  ACR_NAME: ${{ vars.ACR_NAME }}                     # e.g. coachingacademyacr
  RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}   # e.g. coaching-academy-rg
  CONTAINER_APP: ${{ vars.CONTAINER_APP_NAME }}      # e.g. coaching-api
  IMAGE_NAME: coaching-backend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build image in ACR
        run: |
          az acr build \
            --registry $ACR_NAME \
            --image $IMAGE_NAME:${{ github.sha }} \
            --image $IMAGE_NAME:latest \
            ./backend

      - name: Update Container App
        run: |
          az containerapp update \
            --name $CONTAINER_APP \
            --resource-group $RESOURCE_GROUP \
            --image $ACR_NAME.azurecr.io/$IMAGE_NAME:${{ github.sha }}
